version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: waveform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: waveform
      POSTGRES_PASSWORD: waveform
      POSTGRES_DB: waveform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: waveform_minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: waveform
      MINIO_ROOT_PASSWORD: waveformsecret
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console UI
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:


